<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Mood Lab Arena v6</title>
  <style>*{margin:0;padding:0}body{background:#050510;overflow-x:hidden;}</style>
</head>
<body>
  <div id="root"></div>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script>
    // Fetch JSX, prepend React hook shim, transpile in-browser, render
    fetch('moodlab-arena-v6.jsx?v=' + Date.now())
      .then(r => r.text())
      .then(jsx => {
        // Replace the import statement with destructuring from React global
        const code = jsx.replace(
          /import\s*\{[^}]+\}\s*from\s*["']react["'];?/,
          'const { useState, useRef, useEffect, useCallback } = React;'
        ).replace(
          /export\s+default\s+function/,
          'function'
        );
        // Transpile JSX -> JS
        const transformed = Babel.transform(code, {
          presets: ['react'],
          filename: 'moodlab-arena-v6.jsx',
        }).code;
        // Execute
        const fn = new Function('React', 'ReactDOM', transformed + '\nreturn MoodLabArena;');
        const App = fn(React, ReactDOM);
        ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
      })
      .catch(err => {
        document.getElementById('root').innerHTML =
          '<pre style="color:#ff4444;padding:20px;font-size:14px;">Error loading app:\n' + err.message + '</pre>';
        console.error(err);
      });
  </script>
</body>
</html>
